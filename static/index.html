<!DOCTYPE html>
<html>
<head>
  <title>Items</title>
</head>
<body>
  <h1>Items</h1>

  <h2>Add Item</h2>
  <label>Name: <input type="text" id="name"></label><br>
  <label>Description: <input type="text" id="description"></label><br>
  <button onclick="createItem()">Create</button>

  <h2>Item List</h2>
  <div id="items"></div>

  <h2>Iris Prediction</h2>
  <label>Sepal length: <input type="number" step="0.1" id="f0" value="5.1"></label><br>
  <label>Sepal width:  <input type="number" step="0.1" id="f1" value="3.5"></label><br>
  <label>Petal length: <input type="number" step="0.1" id="f2" value="1.4"></label><br>
  <label>Petal width:  <input type="number" step="0.1" id="f3" value="0.2"></label><br>
  <button onclick="predictIris()">Predict</button>
  <div id="prediction-result"></div>

  <script>
    const API = "/items";

    async function loadItems() {
      const res = await fetch(API);
      const items = await res.json();
      const container = document.getElementById("items");
      container.innerHTML = "";

      if (items.length === 0) {
        container.textContent = "No items.";
        return;
      }

      for (const item of items) {
        const div = document.createElement("div");
        div.id = "item-" + item.id;

        const info = document.createElement("span");
        info.id = "info-" + item.id;
        info.textContent = `[${item.id}] ${item.name} — ${item.description ?? ""}`;

        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.onclick = () => showEditForm(item);

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = () => deleteItem(item.id);

        div.appendChild(info);
        div.appendChild(document.createTextNode(" "));
        div.appendChild(editBtn);
        div.appendChild(document.createTextNode(" "));
        div.appendChild(deleteBtn);
        container.appendChild(div);
        container.appendChild(document.createElement("br"));
      }
    }

    function showEditForm(item) {
      const div = document.getElementById("item-" + item.id);
      // Remove existing edit form if present
      const existing = document.getElementById("edit-form-" + item.id);
      if (existing) { existing.remove(); return; }

      const form = document.createElement("div");
      form.id = "edit-form-" + item.id;

      const nameInput = document.createElement("input");
      nameInput.type = "text";
      nameInput.value = item.name;

      const descInput = document.createElement("input");
      descInput.type = "text";
      descInput.value = item.description ?? "";

      const saveBtn = document.createElement("button");
      saveBtn.textContent = "Save";
      saveBtn.onclick = () => updateItem(item.id, nameInput.value, descInput.value);

      const cancelBtn = document.createElement("button");
      cancelBtn.textContent = "Cancel";
      cancelBtn.onclick = () => form.remove();

      form.appendChild(document.createTextNode("Name: "));
      form.appendChild(nameInput);
      form.appendChild(document.createTextNode(" Desc: "));
      form.appendChild(descInput);
      form.appendChild(document.createTextNode(" "));
      form.appendChild(saveBtn);
      form.appendChild(document.createTextNode(" "));
      form.appendChild(cancelBtn);

      div.appendChild(document.createElement("br"));
      div.appendChild(form);
    }

    async function createItem() {
      const name = document.getElementById("name").value.trim();
      const description = document.getElementById("description").value.trim();
      if (!name) { alert("Name is required."); return; }

      await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, description: description || null })
      });

      document.getElementById("name").value = "";
      document.getElementById("description").value = "";
      loadItems();
    }

    async function updateItem(id, name, description) {
      if (!name.trim()) { alert("Name is required."); return; }

      await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name.trim(), description: description.trim() || null })
      });

      loadItems();
    }

    async function deleteItem(id) {
      if (!confirm("Delete this item?")) return;
      await fetch(`${API}/${id}`, { method: "DELETE" });
      loadItems();
    }

    async function predictIris() {
      const features = ["f0", "f1", "f2", "f3"].map(id => parseFloat(document.getElementById(id).value));
      const out = document.getElementById("prediction-result");
      if (features.some(Number.isNaN)) {
        out.textContent = "Please enter all four numeric features.";
        return;
      }

      const res = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ features })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        out.textContent = `Error: ${err.detail ?? res.status}`;
        return;
      }

      const data = await res.json();
      const pct = (data.confidence * 100).toFixed(2);
      out.textContent = `Prediction: ${data.prediction} (confidence ${pct}%)`;
    }

    loadItems();
  </script>
</body>
</html>
